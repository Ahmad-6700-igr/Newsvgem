name: Auto Tech News Bot

on:
  schedule:
    # Waktu berjalan dalam format UTC. 
    # 01:00 UTC sama dengan jam 08:00 WIB (UTC+7).
    - cron: '0 1 * * *'
  
  # Trigger ini memungkinkan kamu menjalankan script secara manual via tombol
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser requests

    - name: Jalankan Script Bot Berita
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python bot_berita.py
